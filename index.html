<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>بُوت زِيد | Elite Team</title>
</head>
<body>
    <!-- صفحة الدخول -->
    <div id="authOverlay" class="overlay">
        <div class="auth-card">
            <h2>🚀 دخول النخبة</h2>
            <input type="text" id="username" placeholder="اسم المستخدم">
            <input type="password" id="password" placeholder="كلمة السر">
            <button onclick="handleAuth('login')">دخول</button>
            <button onclick="handleAuth('register')" style="background:#334155; margin-top:10px;">إنشاء حساب</button>
        </div>
    </div>

    <!-- التطبيق الرئيسي -->
    <div class="main-layout">
        <header>
            <div class="logo">بُوت زِيد</div>
            <div id="userProfile" onclick="logout()">خروج</div>
        </header>

        <div class="chat-container" id="chatArea">
            <div id="chatMessages"></div>
        </div>

        <div class="input-container">
            <input type="text" id="userInput" placeholder="اسأل زيد عن درسك...">
            <button onclick="send()">إرسال</button>
        </div>

        <div class="stats-bar">
            <div onclick="openLeaderboard()">🏆 لوحة الصدارة</div>
            <div id="userScore">نقاطك: 0</div>
        </div>
    </div>

    <div id="leaderboardModal" class="overlay">
        <div class="auth-card">
            <h2>🏆 المتصدرون</h2>
            <div id="leaderboardList"></div>
            <button onclick="closeModal()">إغلاق</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
